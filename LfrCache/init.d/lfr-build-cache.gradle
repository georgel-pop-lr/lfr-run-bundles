// Managed by LfrCache. The installed copy in ~/.gradle/init.d is generated by
// 'lfrCache install', which fills in the registry path below.
// Turns the Gradle build cache ON only for repos/worktrees listed in the
// registry file. It never forces caching off, so every other build (Liferay or
// not) keeps whatever it already had configured.
//
// The local cache dir stays the shared default (GRADLE_USER_HOME/caches/
// build-cache-1), so all enabled repos and worktrees reuse each other's output.

def registry = new File('@LFRCACHE_REGISTRY@')

if (registry.exists()) {
    def buildDir = (gradle.startParameter.currentDir ?: new File('.')).absolutePath

    def enabled = registry.readLines()
        .collect { it.trim() }
        .findAll { it && !it.startsWith('#') }
        .any { path -> buildDir == path || buildDir.startsWith(path + File.separator) }

    if (enabled) {
        gradle.startParameter.buildCacheEnabled = true
        println "[LfrCache] Gradle build cache ON (${buildDir})"
    }
}
